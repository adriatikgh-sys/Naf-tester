<div id="root"><div style="min-height: 100vh; padding: 40px 32px; max-width: 1400px; margin: 0px auto;"><div style="display: flex; align-items: center; gap: 16px; margin-bottom: 40px;"><div style="width: 44px; height: 44px; border-radius: 10px; background: rgb(34, 197, 94); display: flex; align-items: center; justify-content: center; font-size: 22px;">🚗</div><div><h1 style="font-size: 26px; font-weight: 700; letter-spacing: -1px;">NAF Rapport Analyzer</h1><div style="font-size: 12px; color: rgb(85, 85, 85); margin-top: 2px;">Batch-analyse av NAF Bruktbiltester</div></div></div><div style="margin-bottom: 28px; background: rgb(13, 13, 13); border: 1px solid rgb(26, 26, 26); border-radius: 12px; padding: 16px 20px;"><div style="font-size: 11px; color: rgb(85, 85, 85); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px;">Anthropic API-nøkkel</div><div style="display: flex; gap: 10px; align-items: center;"><input type="password" placeholder="sk-ant-..." value="" style="flex: 1 1 0%; background: rgb(17, 17, 17); border: 1px solid rgb(42, 42, 42); color: rgb(204, 204, 204); padding: 8px 14px; border-radius: 8px; font-size: 13px; font-family: inherit;"><a href="https://console.anthropic.com/" target="_blank" style="font-size: 11px; white-space: nowrap;">Hent nøkkel →</a></div></div><div class="drop-zone" style="border: 2px dashed rgb(42, 42, 42); border-radius: 16px; padding: 48px 32px; text-align: center; cursor: pointer; transition: 0.2s; background: rgb(13, 13, 13); margin-bottom: 24px;"><div style="font-size: 40px; margin-bottom: 12px;">📂</div><div style="font-size: 16px; font-weight: 600; margin-bottom: 8px;">Slipp PDF-filer her eller klikk for å velge</div><div style="font-size: 12px; color: rgb(85, 85, 85);">Støtter opplasting av mange filer samtidig</div><input id="file-input" type="file" multiple="" accept=".pdf" style="display: none;"></div><div style="text-align: center; padding: 60px 0px; color: rgb(51, 51, 51);"><div style="font-size: 48px; margin-bottom: 16px;">📋</div><div style="font-size: 14px;">Last opp NAF Bruktbiltest PDF-filer for å starte</div></div></div></div>
<script type="text/babel">
const { useState, useCallback, useRef } = React;

const FIELDS_TO_EXTRACT = `Trekk ut disse feltene fra NAF Bruktbiltest-rapporten og returner KUN gyldig JSON:
{
  "rapport_id": "rapport-nummer fra bunntekst",
  "testdato": "dato YYYY-MM-DD",
  "bilmerke": "string",
  "modell": "string",
  "farge": "string",
  "km_stand": number eller null,
  "drivstoff": "string",
  "motoreffekt_kw": number eller null,
  "registreringsaar": number eller null,
  "registreringsnr": "string",
  "bruktimportert": "Ja" eller "Nei" eller null,
  "proevekjoert": "Ja" eller "Nei",
  "antall_feil_repareres": number,
  "antall_opplysninger": number,
  "feil_liste": ["korte beskrivelser av feil som må repareres"],
  "naf_senter": "string"
}
Returner BARE JSON, ingen forklaring eller markdown.`;

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function extractFromPDF(base64Data, filename, apiKey, retries = 3) {
  for (let attempt = 0; attempt < retries; attempt++) {
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: [
              { type: "document", source: { type: "base64", media_type: "application/pdf", data: base64Data } },
              { type: "text", text: FIELDS_TO_EXTRACT }
            ]
          }]
        })
      });
      if (response.status === 529 || response.status === 429) { await sleep(5000 * (attempt+1)); continue; }
      const data = await response.json();
      if (data.error) throw new Error(data.error.message);
      const text = data.content?.[0]?.text || "{}";
      const clean = text.replace(/```json|```/g, "").trim();
      return { ...JSON.parse(clean), _filename: filename, _status: "ok" };
    } catch(e) {
      if (attempt === retries-1) return { _filename: filename, _status: "feil", _error: e.message };
      await sleep(2000);
    }
  }
}

function toCSV(rows) {
  if (!rows.length) return "";
  const keys = Object.keys(rows[0]).filter(k => !k.startsWith("_"));
  const lines = rows.map(r => keys.map(k => {
    const v = Array.isArray(r[k]) ? r[k].join(" | ") : (r[k] ?? "");
    return `"${String(v).replace(/"/g,'""')}"`;
  }).join(";"));
  return [keys.join(";"), ...lines].join("\n");
}

function StatCard({ label, value, sub, color="#22c55e" }) {
  return (
    <div style={{ background:"#111", border:`1px solid ${color}22`, borderRadius:12, padding:"20px 24px", minWidth:140 }}>
      <div style={{ fontSize:32, fontWeight:800, color, fontFamily:"monospace" }}>{value}</div>
      <div style={{ fontSize:13, color:"#aaa", marginTop:4 }}>{label}</div>
      {sub && <div style={{ fontSize:11, color:"#666", marginTop:2 }}>{sub}</div>}
    </div>
  );
}

function App() {
  const [apiKey, setApiKey] = useState("");
  const [files, setFiles] = useState([]);
  const [results, setResults] = useState([]);
  const [processing, setProcessing] = useState(false);
  const [done, setDone] = useState(0);
  const [dragOver, setDragOver] = useState(false);
  const [filterCol, setFilterCol] = useState("");
  const [filterVal, setFilterVal] = useState("");
  const abortRef = useRef(false);

  const handleDrop = useCallback(e => {
    e.preventDefault(); setDragOver(false);
    const dropped = Array.from(e.dataTransfer.files).filter(f => f.type === "application/pdf");
    setFiles(prev => [...prev, ...dropped]);
  }, []);

  const readAsBase64 = file => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });

  const startProcessing = async () => {
    if (!files.length || !apiKey) return;
    setProcessing(true); setResults([]); setDone(0); abortRef.current = false;
    const queue = [...files];
    const allResults = [];
    const worker = async () => {
      while (queue.length > 0 && !abortRef.current) {
        const file = queue.shift();
        try {
          const b64 = await readAsBase64(file);
          const result = await extractFromPDF(b64, file.name, apiKey);
          allResults.push(result && result._status ? result : { _filename: file.name, _status: "feil", _error: "Uventet svar" });
        } catch(e) {
          allResults.push({ _filename: file.name, _status: "feil", _error: e.message });
        }
        setDone(d => d+1);
        setResults([...allResults]);
        await sleep(1500);
      }
    };
    await Promise.all(Array.from({length:2}, worker));
    setProcessing(false);
  };

  const downloadCSV = () => {
    const ok = results.filter(r => r._status === "ok");
    const csv = toCSV(ok);
    const blob = new Blob(["\uFEFF"+csv], { type:"text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download="naf_rapporter.csv"; a.click();
  };

  const ok = results.filter(r => r._status === "ok");
  const errors = results.filter(r => r._status === "feil");
  const pct = files.length ? Math.round((done/files.length)*100) : 0;

  const stats = ok.length ? {
    proevekjoert: ok.filter(r => r.proevekjoert === "Ja").length,
    farger: Object.entries(ok.reduce((a,r)=>{ if(r.farge) a[r.farge]=(a[r.farge]||0)+1; return a; },{})).sort((a,b)=>b[1]-a[1]).slice(0,8),
    snittKm: Math.round(ok.filter(r=>r.km_stand).reduce((s,r)=>s+r.km_stand,0)/ok.filter(r=>r.km_stand).length),
    medFeil: ok.filter(r=>r.antall_feil_repareres>0).length,
    merker: Object.entries(ok.reduce((a,r)=>{ if(r.bilmerke) a[r.bilmerke]=(a[r.bilmerke]||0)+1; return a; },{})).sort((a,b)=>b[1]-a[1]).slice(0,5),
  } : null;

  const visibleCols = ok.length ? Object.keys(ok[0]).filter(k => !k.startsWith("_") && k !== "feil_liste") : [];
  const filteredRows = ok.filter(row => {
    if (!filterCol || !filterVal) return true;
    return String(row[filterCol]??"").toLowerCase().includes(filterVal.toLowerCase());
  });

  return (
    <div style={{ minHeight:"100vh", padding:"40px 32px", maxWidth:1400, margin:"0 auto" }}>
      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", gap:16, marginBottom:40 }}>
        <div style={{ width:44, height:44, borderRadius:10, background:"#22c55e", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>🚗</div>
        <div>
          <h1 style={{ fontSize:26, fontWeight:700, letterSpacing:-1 }}>NAF Rapport Analyzer</h1>
          <div style={{ fontSize:12, color:"#555", marginTop:2 }}>Batch-analyse av NAF Bruktbiltester</div>
        </div>
      </div>

      {/* API Key */}
      <div style={{ marginBottom:28, background:"#0d0d0d", border:"1px solid #1a1a1a", borderRadius:12, padding:"16px 20px" }}>
        <div style={{ fontSize:11, color:"#555", textTransform:"uppercase", letterSpacing:2, marginBottom:10 }}>Anthropic API-nøkkel</div>
        <div style={{ display:"flex", gap:10, alignItems:"center" }}>
          <input
            type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)}
            placeholder="sk-ant-..."
            style={{ flex:1, background:"#111", border:`1px solid ${apiKey?"#22c55e44":"#2a2a2a"}`, color:"#ccc", padding:"8px 14px", borderRadius:8, fontSize:13, fontFamily:"inherit" }}
          />
          {apiKey
            ? <span style={{ color:"#22c55e", fontSize:12, whiteSpace:"nowrap" }}>✓ Nøkkel satt</span>
            : <a href="https://console.anthropic.com" target="_blank" style={{ fontSize:11, whiteSpace:"nowrap" }}>Hent nøkkel →</a>
          }
        </div>
      </div>

      {/* Drop zone */}
      <div
        className="drop-zone"
        onDrop={handleDrop}
        onDragOver={e=>{e.preventDefault();setDragOver(true);}}
        onDragLeave={()=>setDragOver(false)}
        onClick={()=>document.getElementById("file-input").click()}
        style={{ border:`2px dashed ${dragOver?"#22c55e":"#2a2a2a"}`, borderRadius:16, padding:"48px 32px", textAlign:"center", cursor:"pointer", transition:"all 0.2s", background:dragOver?"#0f1f0f":"#0d0d0d", marginBottom:24 }}
      >
        <div style={{ fontSize:40, marginBottom:12 }}>📂</div>
        <div style={{ fontSize:16, fontWeight:600, marginBottom:8 }}>Slipp PDF-filer her eller klikk for å velge</div>
        <div style={{ fontSize:12, color:"#555" }}>Støtter opplasting av mange filer samtidig</div>
        <input id="file-input" type="file" multiple accept=".pdf" style={{ display:"none" }} onChange={e=>setFiles(prev=>[...prev,...Array.from(e.target.files)])} />
      </div>

      {/* File controls */}
      {files.length > 0 && (
        <div style={{ marginBottom:24, background:"#0d0d0d", border:"1px solid #1a1a1a", borderRadius:12, padding:20 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <span style={{ fontSize:14, color:"#aaa" }}><span style={{ color:"#22c55e", fontWeight:700 }}>{files.length}</span> PDF-filer klare</span>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={()=>setFiles([])} style={{ background:"none", border:"1px solid #333", color:"#888", padding:"6px 14px", borderRadius:8, cursor:"pointer", fontSize:12, fontFamily:"inherit" }}>Fjern alle</button>
              <button onClick={startProcessing} disabled={processing||!apiKey} style={{ background:(processing||!apiKey)?"#1a2a1a":"#22c55e", color:(processing||!apiKey)?"#4a7a4a":"#000", border:"none", padding:"8px 20px", borderRadius:8, cursor:(processing||!apiKey)?"not-allowed":"pointer", fontWeight:700, fontSize:13, fontFamily:"inherit" }}>
                {processing ? "⏳ Analyserer..." : !apiKey ? "Legg inn API-nøkkel først" : "▶ Start analyse"}
              </button>
            </div>
          </div>
          <div style={{ maxHeight:100, overflowY:"auto", display:"flex", flexWrap:"wrap", gap:6 }}>
            {files.slice(0,50).map((f,i)=>(
              <span key={i} style={{ background:"#151515", border:"1px solid #222", borderRadius:6, padding:"3px 10px", fontSize:11, color:"#888" }}>{f.name}</span>
            ))}
            {files.length > 50 && <span style={{ fontSize:11, color:"#555", padding:"3px 10px" }}>+{files.length-50} til...</span>}
          </div>
        </div>
      )}

      {/* Progress */}
      {processing && (
        <div style={{ margin:"16px 0" }}>
          <div style={{ display:"flex", justifyContent:"space-between", fontSize:13, color:"#aaa", marginBottom:6 }}>
            <span>Prosesserer... {done}/{files.length}</span><span>{pct}%</span>
          </div>
          <div style={{ height:8, background:"#222", borderRadius:99, overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${pct}%`, background:"linear-gradient(90deg,#22c55e,#4ade80)", borderRadius:99, transition:"width 0.3s" }} />
          </div>
        </div>
      )}

      {errors.length > 0 && (
        <div style={{ background:"#1a0a0a", border:"1px solid #ff444422", borderRadius:8, padding:"10px 16px", marginBottom:16, fontSize:12, color:"#ff6666" }}>
          ⚠️ {errors.length} filer feilet: {errors.map(e=>e._filename).join(", ")}
          {errors[0]?._error && <div style={{marginTop:4, color:"#ff4444"}}>Feil: {errors[0]._error}</div>}
        </div>
      )}

      {/* Stats */}
      {stats && (
        <div style={{ marginBottom:32 }}>
          <div style={{ fontSize:12, color:"#555", marginBottom:12, textTransform:"uppercase", letterSpacing:2 }}>Sammendrag</div>
          <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:20 }}>
            <StatCard label="Analyserte rapporter" value={ok.length} color="#22c55e" />
            <StatCard label="Prøvekjørt" value={stats.proevekjoert} sub={`${Math.round(stats.proevekjoert/ok.length*100)}% av totalt`} color="#4ade80" />
            <StatCard label="Har feil (repareres)" value={stats.medFeil} sub={`${Math.round(stats.medFeil/ok.length*100)}% av totalt`} color="#f59e0b" />
            <StatCard label="Snitt km-stand" value={isNaN(stats.snittKm)?"–":stats.snittKm.toLocaleString("nb-NO")} color="#38bdf8" />
          </div>
          <div style={{ display:"flex", gap:16, flexWrap:"wrap" }}>
            <div style={{ background:"#111", border:"1px solid #1a1a1a", borderRadius:12, padding:"16px 20px", flex:1, minWidth:200 }}>
              <div style={{ fontSize:11, color:"#555", marginBottom:10, textTransform:"uppercase", letterSpacing:1 }}>Topp bilmerker</div>
              {stats.merker.map(([m,c])=>(
                <div key={m} style={{ display:"flex", justifyContent:"space-between", marginBottom:6, fontSize:13 }}>
                  <span style={{ color:"#ccc" }}>{m}</span><span style={{ color:"#22c55e", fontWeight:700 }}>{c}</span>
                </div>
              ))}
            </div>
            <div style={{ background:"#111", border:"1px solid #1a1a1a", borderRadius:12, padding:"16px 20px", flex:1, minWidth:200 }}>
              <div style={{ fontSize:11, color:"#555", marginBottom:10, textTransform:"uppercase", letterSpacing:1 }}>Fargefordeling</div>
              {stats.farger.map(([f,c])=>(
                <div key={f} style={{ display:"flex", justifyContent:"space-between", marginBottom:6, fontSize:13 }}>
                  <span style={{ color:"#ccc" }}>{f}</span><span style={{ color:"#38bdf8", fontWeight:700 }}>{c}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Table */}
      {ok.length > 0 && (
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, flexWrap:"wrap", gap:10 }}>
            <div style={{ fontSize:12, color:"#555", textTransform:"uppercase", letterSpacing:2 }}>{filteredRows.length} rader</div>
            <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
              <select value={filterCol} onChange={e=>{setFilterCol(e.target.value);setFilterVal("");}}
                style={{ background:"#111", border:"1px solid #2a2a2a", color:"#ccc", padding:"6px 10px", borderRadius:8, fontSize:12, fontFamily:"inherit" }}>
                <option value="">Filtrer kolonne...</option>
                {visibleCols.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
              {filterCol && (
                <input value={filterVal} onChange={e=>setFilterVal(e.target.value)} placeholder={`Søk i ${filterCol}...`}
                  style={{ background:"#111", border:"1px solid #2a2a2a", color:"#ccc", padding:"6px 12px", borderRadius:8, fontSize:12, fontFamily:"inherit", width:160 }} />
              )}
              <button onClick={downloadCSV} style={{ background:"#111", border:"1px solid #22c55e44", color:"#22c55e", padding:"6px 16px", borderRadius:8, cursor:"pointer", fontSize:12, fontFamily:"inherit" }}>
                ⬇ Last ned CSV
              </button>
            </div>
          </div>
          <div style={{ overflowX:"auto", borderRadius:12, border:"1px solid #1a1a1a" }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
              <thead>
                <tr style={{ background:"#111" }}>
                  {visibleCols.map(c=>(
                    <th key={c} style={{ padding:"10px 14px", textAlign:"left", color:"#555", borderBottom:"1px solid #1a1a1a", fontWeight:600, fontSize:11, textTransform:"uppercase", letterSpacing:0.5, whiteSpace:"nowrap", background:"#111", position:"sticky", top:0 }}>
                      {c.replace(/_/g," ")}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filteredRows.map((row,i)=>(
                  <tr key={i} style={{ borderBottom:"1px solid #111", background:i%2===0?"#0a0a0a":"#0d0d0d" }}>
                    {visibleCols.map(c=>{
                      const v = row[c];
                      let display = Array.isArray(v) ? v.join(", ") : (v??"–");
                      let color = "#ccc";
                      if (c==="proevekjoert") color = v==="Ja"?"#22c55e":"#ff6666";
                      if (c==="antall_feil_repareres"&&v>0) color = "#f59e0b";
                      return <td key={c} style={{ padding:"9px 14px", color, whiteSpace:"nowrap", maxWidth:200, overflow:"hidden", textOverflow:"ellipsis" }}>{String(display)}</td>;
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {!files.length && !results.length && (
        <div style={{ textAlign:"center", padding:"60px 0", color:"#333" }}>
          <div style={{ fontSize:48, marginBottom:16 }}>📋</div>
          <div style={{ fontSize:14 }}>Last opp NAF Bruktbiltest PDF-filer for å starte</div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>


</body></html>
